<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUDOVOX</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="container">
<div id="toolbar">
    
    <label for="stroke"></label>
    <input id="stroke" name="stroke" type="color">
  
    <div class="brush"></div>
    <input id="lineWidth" name="lineWidth" type="range" value="5">
    <button id="clear"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
viewBox="0 0 24 24" fill="none" stroke="currentColor"
stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20 20H7L3 16a2.8 2.8 0 0 1 0-4l8-8a2.8 2.8 0 0 1 4 0l6 6a2.8 2.8 0 0 1 0 4l-6 6"/>
  <path d="M18 13 11 6"/>
</svg></button>

<div class="pen" id="pdfTool">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="24"
         height="24"
         viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2"
         stroke-linecap="round"
         stroke-linejoin="round">

        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <path d="M14 2v6h6"/>
        <path d="M12 16v-6"/>
        <path d="M9.5 12.5 12 10l2.5 2.5"/>
    </svg>
</div>
<div class="grid" id="gridtool"><img src= "grid-svgrepo-com.svg"></div>


</div>
    <div class="drawing-board">
        <canvas id="drawing-board"></canvas>
    </div>
    </section>
    <script src="./script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUDOVOX</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="container">
<div id="toolbar">
    
    <label for="stroke"></label>
    <input id="stroke" name="stroke" type="color">
  
    <div class="brush"></div>
    <input id="lineWidth" name="lineWidth" type="range" value="5">
    <button id="clear"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
viewBox="0 0 24 24" fill="none" stroke="currentColor"
stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20 20H7L3 16a2.8 2.8 0 0 1 0-4l8-8a2.8 2.8 0 0 1 4 0l6 6a2.8 2.8 0 0 1 0 4l-6 6"/>
  <path d="M18 13 11 6"/>
</svg></button>
<div class="pen"><svg xmlns="http://www.w3.org/2000/svg" viewBox="-0.5 -0.5 16 16" fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" class="feather feather-pen-tool" id="Pen-Tool--Streamline-Feather" height="16" width="16">
  <desc>
    Pen Tool Streamline Icon: https://streamlinehq.com
  </desc>
  <path d="m7.5 11.875 4.375 -4.375 1.875 1.875 -4.375 4.375 -1.875 -1.875z" stroke-width="1"></path>
  <path d="m11.25 8.125 -0.9375 -4.6875L1.25 1.25l2.1875 9.0625L8.125 11.25l3.125 -3.125z" stroke-width="1"></path>
  <path d="m1.25 1.25 4.74125 4.74125" stroke-width="1"></path>
  <path d="M5.625 6.875a1.25 1.25 0 1 0 2.5 0 1.25 1.25 0 1 0 -2.5 0" stroke-width="1"></path>
</svg></div>
<div class="grid" id="gridtool"><img src= "grid-svgrepo-com.svg"></div>
</div>
    <div class="drawing-board">
        <canvas id="drawing-board"></canvas>
    </div>
    </section>
    <script src="./script.js"></script>
</body>
</html>

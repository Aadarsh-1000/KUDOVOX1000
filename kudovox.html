<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUDOVOX</title>
    <link rel="stylesheet" href="styles.css">
     <link
        href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Varela+Round&display=swap"

<body>
    <section class="container">
<div id="toolbar">
    
    <label for="stroke"></label>
    <input id="stroke" name="stroke" type="color">
  
    <div class="brush"></div>
    <input id="lineWidth" name="lineWidth" type="range" value="5">
    <button id="clear"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
viewBox="0 0 24 24" fill="none" stroke="currentColor"
stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M20 20H7L3 16a2.8 2.8 0 0 1 0-4l8-8a2.8 2.8 0 0 1 4 0l6 6a2.8 2.8 0 0 1 0 4l-6 6"/>
  <path d="M18 13 11 6"/>
</svg></button>

<div class="pen" id="pdfTool">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="24"
         height="24"
         viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2"
         stroke-linecap="round"
         stroke-linejoin="round">

        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <path d="M14 2v6h6"/>
        <path d="M12 16v-6"/>
        <path d="M9.5 12.5 12 10l2.5 2.5"/>
    </svg>
</div>
<div class="grid" id="gridtool"><img  id="gridd" src= "grid-svgrepo-com.svg"></div>
 

</div>

<div class="header"><div class="circle"></div>KUDOVOX</div>
   
    <div class="drawing-board">
        
        <canvas id="drawing-board"></canvas>
        
    </div>
   
    
    </section>
                   
    <section id="bg">
        <h3>Properties</h3>
        <hr>
        <div class="edit"><img id="mouse"   src="click.png" height="25px" width="25px"></div>
        <div class="exp">Select a backround image</div>
        <hr>

        <h2> Canvas Background</h2>
        <p>Simple Backgrounds</p>
        <div id="c1"></div>
        <div id="c2"></div>
        <div id="c3"></div>
        <div id="c4"></div>
        <div class="p1">Abstract Backgrounds</div>
        <div id="c5"></div>
        <div id="c6"></div>
        <div id="c7"></div>
        <div id="c8"></div>
        <div class="p2">Gradient Backgrounds</div>
        <div id="c9"></div>
        <div id="c10"></div>
        <div id="c11"></div>
        <div id="c12"></div>
    </section>

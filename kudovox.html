<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUDOVOX</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Exo:wght@400;600&family=Philosopher:wght@400;700&family=Space+Grotesk:wght@400;700&family=DM+Sans:wght@400;700&family=Montserrat:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&family=Lato:wght@400;700&family=Oswald:wght@400;700&family=Raleway:wght@400;700&family=Nunito:wght@400;700&family=Inter:wght@400;700&family=Work+Sans:wght@400;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=Bebas+Neue&family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&family=Pacifico&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
</head>

<body>
    <section class="container">
        <div id="toolbar">

            <label for="stroke"></label>
            <input id="stroke" name="stroke" type="color">

            <div class="brush"></div>
            <input id="lineWidth" name="lineWidth" type="range" value="5">
            <button id="clear"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 20H7L3 16a2.8 2.8 0 0 1 0-4l8-8a2.8 2.8 0 0 1 4 0l6 6a2.8 2.8 0 0 1 0 4l-6 6" />
                    <path d="M18 13 11 6" />
                </svg></button>

            <div class="pen" id="pdfTool">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <path d="M14 2v6h6" />
                    <path d="M12 16v-6" />
                    <path d="M9.5 12.5 12 10l2.5 2.5" />
                </svg>
            </div>
            <button id="penn"><img src="pen-square-svgrepo-com.svg" id="penTool" alt=""></button>
            <div class="grid" id="gridtool"><img id="gridd" src="grid-svgrepo-com.svg"></div>

            <button id="textTool" title="Add Text">
                <img src="text-svgrepo-com.svg" id="addtxt" alt="">
            </button>


        </div>

        <div class="header">
            <div class="circle"></div>KUDOVOX
        </div>

        <div class="drawing-board">

            <canvas id="drawing-board"></canvas>

        </div>


    </section>

    <section id="bg">

        <h3>Properties</h3>
        <hr>
        <div class="edit"><img id="mouse" src="click.png" height="25px" width="25px"></div>
        <div class="exp">Select a backround image</div>
        <hr>

        <h2> Canvas Background</h2>
        <p>Simple Backgrounds</p>
        <div id="c1"></div>
        <div id="c2"></div>
        <div id="c3"></div>
        <div id="c4"></div>
        <div class="p1">Abstract Backgrounds</div>
        <div id="c5"></div>
        <div id="c6"></div>
        <div id="c7"></div>
        <div id="c8"></div>
        <div class="p2">Gradient Backgrounds</div>
        <div id="c9"></div>
        <div id="c10"></div>
        <div id="c11"></div>
        <div id="c12"></div>
        <br>
        <select id="font">
            <option value="Poppins">Poppins</option>
            <option value="Exo">Exo</option>
            <option value="Philosopher">Philosopher</option>
            <option value="Space Grotesk">Space Grotesk</option>
            <option value="DM Sans">DM Sans</option>

            <option value="Montserrat">Montserrat</option>
            <option value="Roboto">Roboto</option>
            <option value="Open Sans">Open Sans</option>
            <option value="Lato">Lato</option>
            <option value="Oswald">Oswald</option>

            <option value="Raleway">Raleway</option>
            <option value="Nunito">Nunito</option>
            <option value="Inter">Inter</option>
            <option value="Work Sans">Work Sans</option>
            <option value="Merriweather">Merriweather</option>

            <option value="Playfair Display">Playfair Display</option>
            <option value="Bebas Neue">Bebas Neue</option>
            <option value="Orbitron">Orbitron</option>
            <option value="Rajdhani">Rajdhani</option>
            <option value="Pacifico">Pacifico</option>

        </select>
        <h4>Font Size</h4>
        <input id="fontsize" name="Font-size" type="range" value="5">

    </section>
    <button id="closesidebar"><img src="close.png" alt="" height="40px" width="60px" id="closesidebar"></button>

    <script src="./script.js"></script>
</body>

</html>
